name: Deploy Backoffice

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  validate_dispatch:
    name: Validate workflow_dispatch
    runs-on: ubuntu-latest
    steps:
      - name: Check tag matches action intent
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            if [[ ! "${{ github.ref_name }}" =~ ^io-services-cms-backoffice@ ]]; then
              echo "Tag '${{ github.ref_name }}' does not match the pattern 'io-services-cms-backoffice@*'"
              echo "This action is intended for deploying io-services-cms-backoffice"
              exit 1
            fi
            echo "Tag '${{ github.ref_name }}' matches expected pattern"
          else
            echo "Running from branch: ${{ github.ref_name }}"
          fi

  deploy_to_azure:
    needs: validate_dispatch
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'release' &&
        startsWith(github.event.release.tag_name, 'io-services-cms-backoffice@')
      )
    name: Deploy io-services-cms-backoffice
    uses: pagopa/dx/.github/workflows/release-azure-appsvc-v1.yaml@main
    with:
      environment: app-prod
      resource_group_name: 'io-p-itn-svc-rg-01'
      workspace_name: 'io-services-cms-backoffice'
      web_app_name: 'io-p-itn-svc-bo-app-01'
      disable_auto_staging_deploy: true
      use_private_agent: true
    secrets: inherit
    permissions:
      attestations: write
      contents: read
      id-token: write
