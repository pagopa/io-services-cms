# This workflow will perform the code review on each code change.
# It uses the DevEx Code Review action `js_code_review.yaml` which runs the `code-review` script.
# If a `CODECOV_TOKEN` secret is provided, it will also upload the code coverage report to codecov.io.

name: Code Review

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
    paths:
      - apps/**
      - packages/**
      - package.json
      - .github/workflows/code_review.yaml
  workflow_dispatch:

jobs:
  js_code_review:
    uses: pagopa/dx/.github/workflows/js_code_review.yaml@main
    name: Code Review
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write
