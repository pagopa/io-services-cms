name: Static Analysis

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    paths:
      - infra/**
      - .terraform-version
      - .pre-commit-config.yaml
      - .trivyignore

jobs:
  tf_analysis:
    uses: pagopa/dx/.github/workflows/static_analysis.yaml@main
    name: Terraform Validation
    secrets: inherit
    with:
      enable_modified_files_detection: true
